  - generic [ref=e32]:
    - heading "Experiences in Nature" [level=2] [ref=e33]
    - paragraph [ref=e34]: At Lusoi Gardens, we offer a diverse range of leisure activities designed to connect you with nature, create lasting memories, and provide moments of adventure and relaxation. Whether you're seeking outdoor exploration, family fun, or peaceful moments by the fire, our carefully curated experiences blend seamlessly with the natural beauty of Mount Kenya's foothills.
  - generic [ref=e36]:
    - generic [ref=e39]:
      - heading "Nature Walks & Hiking" [level=2] [ref=e40]
      - paragraph [ref=e41]: EXPLORE THE TRAILS
      - paragraph [ref=e42]: Guided nature walks along River Nairobi and through Ngare Ndare Forest. Discover waterfalls, canopy walkways, and diverse wildlife. Perfect for bird watching and photography with designated photo stops along the trails.
    - generic [ref=e47]:
      - heading "Restaurant" [level=2] [ref=e48]
      - paragraph [ref=e49]: FRESH LOCAL CUISINE
      - paragraph [ref=e50]: Savor a delicious meal made with ingredients harvested directly from our on-site farm and local producers. Our restaurant offers a seasonal menu that highlights the region's finest flavors, served in a warm and inviting atmosphere.
    - generic [ref=e53]:
      - heading "Lush Gardens" [level=2] [ref=e54]
      - paragraph [ref=e55]: PEACEFUL RETREAT
      - paragraph [ref=e56]: Stroll through beautifully curated gardens featuring native plants, flowering pathways, and quiet seating areas. A perfect setting for relaxation, photography, or simply enjoying the peaceful surroundings.
    - generic [ref=e61]:
      - heading "Relaxation & Fireside" [level=2] [ref=e62]
      - paragraph [ref=e63]: UNWIND & RECONNECT
      - paragraph [ref=e64]: Garden lounges, outdoor café, and cozy corners with hammocks and reading nooks. Fireside evenings with blankets, herbal tea, and storytelling under the stars. Perfect for group events and team-building. Available on request.
